<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Neon Accent Gradients -->
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#2dd4bf" />
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Solid rounded background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="4"/>

  <!-- Glowing background circuit dots -->
  <circle cx="90" cy="110" r="8" fill="#2dd4bf" opacity="0.15" />
  <circle cx="150" cy="80" r="5" fill="#2dd4bf" opacity="0.1" />
  <circle cx="420" cy="400" r="10" fill="#fbbf24" opacity="0.15" />
  <line x1="90" y1="110" x2="150" y2="80" stroke="#2dd4bf" stroke-width="2" opacity="0.1" />

  <!-- The Book Wings (Open Book Base) -->
  <path d="M 120,380 C 180,350 236,365 256,380 C 276,365 332,350 392,380 L 392,230 C 332,200 276,215 256,230 C 236,215 180,200 120,230 Z" 
        fill="none" stroke="url(#tealGrad)" stroke-width="16" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)" />
  
  <path d="M 130,370 C 185,342 236,357 256,370 C 276,357 327,342 382,370 L 382,240 C 327,212 276,227 256,240 C 236,227 185,212 130,240 Z" 
        fill="#1e293b" opacity="0.85" />

  <!-- Computer monitor overlapping the book -->
  <!-- Stand -->
  <path d="M 226,310 L 210,360 L 302,360 L 286,310 Z" fill="#475569" stroke="#334155" stroke-width="4" stroke-linejoin="round" />
  <!-- Base -->
  <rect x="180" y="354" width="152" height="12" rx="6" fill="url(#tealGrad)" />

  <!-- Laptop / Screen Frame -->
  <rect x="156" y="140" width="200" height="140" rx="16" fill="#0f172a" stroke="url(#tealGrad)" stroke-width="10" filter="url(#glow)" />
  <rect x="166" y="150" width="180" height="120" rx="8" fill="#1e293b" />

  <!-- Screen Content - Stylized P E Lettering as Code -->
  <text x="256" y="215" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="900" font-size="64" fill="url(#tealGrad)" text-anchor="middle" letter-spacing="-2" filter="url(#glow)">PE</text>
  <text x="256" y="250" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="14" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="4">SYSTEMS</text>

  <!-- Laptop Keyboard / Bottom -->
  <path d="M 140,296 L 372,296 L 392,310 L 120,310 Z" fill="url(#tealGrad)" opacity="0.4" />
  <path d="M 140,296 L 372,296 L 382,302 L 130,302 Z" fill="#0d9488" />
  
  <!-- Sleek Golden sparkles representing premium smart POS -->
  <path d="M 380,110 L 385,120 L 395,125 L 385,130 L 380,140 L 375,130 L 365,125 L 375,120 Z" fill="url(#goldGrad)" />
  <path d="M 130,160 L 133,166 L 139,169 L 133,172 L 130,178 L 127,172 L 121,169 L 127,166 Z" fill="url(#goldGrad)" />
</svg>
