<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep rich slate dark slate -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Primary Teal Glow Gradient -->
    <linearGradient id="teal-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>

    <!-- Accent Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
  </defs>

  <!-- Smooth rounded square base for app icon -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Subtle grid lines to emphasize precision/engineering and books -->
  <g opacity="0.08">
    <line x1="64" y1="0" x2="64" y2="512" stroke="#fff" stroke-width="4" />
    <line x1="128" y1="0" x2="128" y2="512" stroke="#fff" stroke-width="4" />
    <line x1="192" y1="0" x2="192" y2="512" stroke="#fff" stroke-width="4" />
    <line x1="256" y1="0" x2="256" y2="512" stroke="#fff" stroke-width="4" />
    <line x1="320" y1="0" x2="320" y2="512" stroke="#fff" stroke-width="4" />
    <line x1="384" y1="0" x2="384" y2="512" stroke="#fff" stroke-width="4" />
    <line x1="448" y1="0" x2="448" y2="512" stroke="#fff" stroke-width="4" />
    
    <line x1="0" y1="64" x2="512" y2="64" stroke="#fff" stroke-width="4" />
    <line x1="0" y1="128" x2="512" y2="128" stroke="#fff" stroke-width="4" />
    <line x1="0" y1="192" x2="512" y2="192" stroke="#fff" stroke-width="4" />
    <line x1="0" y1="256" x2="512" y2="256" stroke="#fff" stroke-width="4" />
    <line x1="0" y1="320" x2="512" y2="320" stroke="#fff" stroke-width="4" />
    <line x1="0" y1="384" x2="512" y2="384" stroke="#fff" stroke-width="4" />
    <line x1="0" y1="448" x2="512" y2="448" stroke="#fff" stroke-width="4" />
  </g>

  <!-- Glowing outer halo -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#teal-glow)" stroke-width="6" opacity="0.25" />
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#teal-glow)" stroke-width="2" opacity="0.5" />

  <!-- The stylized Computer and Book merging graphic -->
  <g transform="translate(10, 5)">
    <!-- Base / Stand of Laptop or monitor -->
    <path d="M190,320 L322,320 L332,342 L180,342 Z" fill="#475569" />
    <rect x="216" y="342" width="80" height="12" rx="4" fill="#64748b" />

    <!-- Monitor backdrop screen border -->
    <rect x="126" y="140" width="260" height="175" rx="16" fill="none" stroke="url(#teal-glow)" stroke-width="12" />

    <!-- Stylized Open Book matching the bottom curve of screen and rising inside -->
    <path d="M 256,260 
             C 220,290 160,265 140,240 
             L 140,160 
             C 160,185 220,210 256,180 
             C 292,210 352,185 372,160 
             L 372,240 
             C 352,265 292,290 256,260 Z" 
          fill="url(#teal-glow)" />

    <!-- Flipping Page element/separator line down the center -->
    <line x1="256" y1="180" x2="256" y2="260" stroke="#0f172a" stroke-width="4" stroke-linecap="round" />

    <!-- Glowing star/sparkle decoration (Gold) indicating brand quality -->
    <path d="M 372,130 L 378,142 L 392,144 L 381,153 L 385,166 L 372,159 L 359,166 L 363,153 L 352,144 L 366,142 Z" 
          fill="url(#gold-grad)" />
    
    <!-- Stylized code lines or text lines in the books -->
    <path d="M 165,190 Q 200,205 235,195" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.75" />
    <path d="M 165,210 Q 200,225 235,215" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.75" />
    <path d="M 165,230 Q 200,245 235,235" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.75" />
    
    <path d="M 347,190 Q 312,205 277,195" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.75" />
    <path d="M 347,210 Q 312,225 277,215" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.75" />
    <path d="M 347,230 Q 312,245 277,235" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.75" />
  </g>
</svg>
